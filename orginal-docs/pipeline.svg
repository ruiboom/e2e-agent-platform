<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 442" width="680" height="442" role="img" aria-label="Agent platform pipeline, looped, with two gates and a shared spine">
<style>
  text{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  .t,.th{font-size:14px;font-weight:500;fill:#1f2430;}
  .ts{font-size:12px;font-weight:400;fill:#3c4250;}
  .c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:1.5;}
  .c-gray rect{fill:#F1F2F4;stroke:#5F6368;stroke-width:1.5;}
</style>
<defs><marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="442" fill="#ffffff"/>
<text x="340" y="22" text-anchor="middle" class="th">Agent platform &#8212; 0 &#8594; live &#8594; improve (a loop, with gates and a spine)</text>

<g class="c-purple"><rect x="16" y="40" width="648" height="60" rx="10"/><text x="32" y="66" class="t">Shape &amp; plan</text><text x="32" y="86" class="ts">discover &#8594; define &#8594; specify &#8594; architect &#8594; plan</text><text x="648" y="66" text-anchor="end" class="ts">experiment-mgmt &#183; scope-maker &#183; jira</text></g>
<g class="c-purple"><rect x="16" y="128" width="648" height="60" rx="10"/><text x="32" y="154" class="t">Make</text><text x="32" y="174" class="ts">ground (KMS kernel) &#8594; build (incl. generative builder)</text><text x="648" y="154" text-anchor="end" class="ts">knowledge-mgmt-system &#183; AF &#183; flexi</text></g>
<g class="c-purple"><rect x="16" y="216" width="648" height="60" rx="10"/><text x="32" y="242" class="t">Prove</text><text x="32" y="262" class="ts">test (multi-persona synthetic) &#8594; evaluate (judge &#183; latency &#183; cost)</text><text x="648" y="242" text-anchor="end" class="ts">test-gen &#183; chat-eval</text></g>
<g class="c-purple"><rect x="16" y="304" width="648" height="60" rx="10"/><text x="32" y="330" class="t">Run &amp; improve</text><text x="32" y="350" class="ts">deploy (multi-target) &#8594; operate &#8594; optimise</text><text x="648" y="330" text-anchor="end" class="ts">deploy &#183; intent-optimiser</text></g>

<line x1="120" y1="100" x2="120" y2="128" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#aP)"/>
<line x1="120" y1="188" x2="120" y2="216" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#aP)"/>
<line x1="120" y1="276" x2="120" y2="304" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#aP)"/>
<text x="395" y="118" text-anchor="middle" class="ts">&#9671; gate: proposition + architecture signed off</text>
<text x="395" y="294" text-anchor="middle" class="ts">&#9671; gate: evaluation pass (quality &#183; latency &#183; cost)</text>

<path d="M16 334 L8 334 L8 70 L16 70" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aP)"/>
<text x="345" y="380" text-anchor="middle" class="ts">&#8635; live signals feed back to discover &#183; specify &#183; ground &#183; build</text>

<g class="c-gray"><rect x="16" y="392" width="648" height="32" rx="8"/><text x="28" y="412" class="t">Cross-cutting spine</text><text x="196" y="412" class="ts">artifact lineage &#183; model router &#183; governance gates &#183; cost/feedback obs</text></g>
</svg>
